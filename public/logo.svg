  <!-- Mặt -->
  <circle cx="128" cy="96" r="26" fill="#FFE0A3"/>

  <!-- Mắt -->
  <circle cx="118" cy="92" r="3.5" fill="#5A3E2B"/>
  <circle cx="138" cy="92" r="3.5" fill="#5A3E2B"/>

  <!-- Miệng -->
  <path d="M118 104 Q128 112 138 104"
        stroke="#5A3E2B"
        stroke-width="2.5"
        stroke-linecap="round"
        fill="none"/>

  <!-- Sóng -->
  <path d="M168 64 Q196 84 196 112"
        stroke="url(#gradBlue)"
