    <!-- Gradient xanh -->
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BC0EB"/>
      <stop offset="100%" stop-color="#3A86FF"/>
